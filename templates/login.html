<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - TEKY CRM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; display: flex; align-items: center; height: 100vh; }
        .login-box { max-width: 400px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="container">
    <div class="login-box text-center">
        <h3 class="mb-4 fw-bold text-primary">ĐĂNG NHẬP HỆ THỐNG</h3>
        
        {% if form.errors %}
            <div class="alert alert-danger">Tên đăng nhập hoặc mật khẩu không đúng!</div>
        {% endif %}

        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %} <div class="mb-3 text-start">
                <label class="form-label fw-bold">Tài khoản</label>
                <input type="text" name="username" class="form-control" placeholder="Nhập username..." required>
            </div>
            
            <div class="mb-4 text-start">
                <label class="form-label fw-bold">Mật khẩu</label>
                <input type="password" name="password" class="form-control" placeholder="Nhập password..." required>
            </div>
            
            <button type="submit" class="btn btn-primary w-100 fw-bold">ĐĂNG NHẬP</button>
            <input type="hidden" name="next" value="{{ next|default:'/' }}"> </form>
    </div>
</div>

</body>
</html>
